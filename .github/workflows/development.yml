name: development deployment

on:
  push:
    branches: ['main']
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Docker Build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/zcnextservices_development .
      - name: Docker Login
        run: docker login --username ${{ secrets.DOCKER_USERNAME }} --password ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/zcnextservices_development
